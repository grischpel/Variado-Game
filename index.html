<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynergyQuest 3D</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./CSS/main.css" rel="stylesheet">
</head>

<body>
    <div id="canvas"></div>

    <aside class="ui-panel">
        <h1 id="game-title" class="h5 mb-3">
            Von Außen nach Innen
        </h1>

        <p id="game-description" class="small">
            Aktiviere Knoten in Natur, Mensch und Technik. Kein Sektor darf mehr als
            einen Knoten Abstand zu den anderen haben.
        </p>

        <div class="mb-3">
            <div class="d-flex justify-content-between small">
                <span id="nature-label">Natur</span>
                <span id="nature-value">0%</span>
            </div>
            <div class="progress">
                <div id="nature-bar" class="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <div class="mb-3">
            <div class="d-flex justify-content-between small">
                <span id="human-label">Mensch</span>
                <span id="human-value">0%</span>
            </div>
            <div class="progress">
                <div id="human-bar" class="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <div class="mb-3">
            <div class="d-flex justify-content-between small">
                <span id="tech-label">Technik</span>
                <span id="tech-value">0%</span>
            </div>
            <div class="progress">
                <div id="tech-bar" class="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <div id="status" class="small">
            Status: Synergie noch nicht erreicht.
        </div>

        <button id="reset-label" class="btn btn-warning btn-sm mt-3" onclick="resetGame()">
            Reset
        </button>

        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-outline-light btn-sm" onclick="setLanguage('de')">
                DE
            </button>

            <button class="btn btn-outline-light btn-sm" onclick="setLanguage('en')">
                EN
            </button>
        </div>
    </aside>

    <script src="./Assets/Libraries/three.min.js"></script>

    <script src="./Assets/Libraries/OBJLoader.js"></script>

    <script src="./Assets/Libraries/gsap.min.js"></script>
    <script src="./Assets/Libraries/bootstrap.bundle.min.js"></script>

    <script src="./JavaScript/translations.js"></script>
    <script src="./JavaScript/main.js"></script>
</body>

</html>
