<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynergyQuest 3D</title>

    <link href="./CSS/main.css" rel="stylesheet">
</head>

<body>
    <div id="status" class="status-bar status-bar--neutral">
        Status: Synergie noch nicht erreicht.
    </div>
    <div id="canvas"></div>
    <aside class="ui-panel">
        <h1 id="game-title" class="h5 mb-3">
            Von Außen nach Innen
        </h1>

        <p id="game-description" class="small">
            Aktiviere Knoten in Natur, Mensch und Technik. Kein Sektor darf mehr als
            einen Knoten Abstand zu den anderen haben.
        </p>

        <div class="progress-group" id="nature-progress">
            <div class="progress-group__header">
                <span id="nature-label">Natur</span>
                <span id="nature-value">0%</span>
            </div>
            <div class="progress">
                <div id="nature-bar" class="progress-bar progress-bar--nature" style="width: 0%"></div>
            </div>
        </div>

        <div class="progress-group" id="human-progress">
            <div class="progress-group__header">
                <span id="human-label">Human</span>
                <span id="human-value">0%</span>
            </div>
            <div class="progress">
                <div id="human-bar" class="progress-bar progress-bar--human" style="width: 0%"></div>
            </div>
        </div>

        <div class="progress-group" id="tech-progress">
            <div class="progress-group__header">
                <span id="tech-label">Technik</span>
                <span id="tech-value">0%</span>
            </div>
            <div class="progress">
                <div id="tech-bar" class="progress-bar progress-bar--tech" style="width: 0%"></div>
            </div>
        </div>

        <button data-title="Galaxy Button" id="reset-label" class="galaxy-button" onclick="resetGame()">
            Reset
        </button>
    </aside>
    <div class="language-wrapper">
        <button class="custom-btn btn-10" onclick="setLanguage('de')">
            DE
        </button>

        <button class="custom-btn btn-10" onclick="setLanguage('en')">
            EN
        </button>
    </div>
    <dialog id="question-dialog" class="question-dialog">
        <form method="dialog" class="question-dialog__content">
            <h2 id="question-dialog-title" class="question-dialog__title">
                Frage
            </h2>

            <p id="question-dialog-text" class="question-dialog__text"></p>

            <div id="question-dialog-answers" class="question-dialog__answers"></div>

            <div class="question-dialog__actions">
                <button type="button" id="question-dialog-cancel" class="question-dialog__cancel">
                    Abbrechen
                </button>
            </div>
        </form>
    </dialog>
    <script src="./Assets/Libraries/three.min.js"></script>

    <script src="./Assets/Libraries/OBJLoader.js"></script>

    <script src="./Assets/Libraries/gsap.min.js"></script>

    <script src="./JavaScript/translations.js"></script>
    <script src="./JavaScript/questions.js"></script>
    <script src="./JavaScript/main.js"></script>
</body>

</html>
